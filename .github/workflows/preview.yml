name: ION CRM — Preview Environments

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

jobs:
  setup:
    name: 🔍 Get Branch Name
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch-names.outputs.current_branch }}
    steps:
      - name: Get branch name
        id: branch-names
        uses: tj-actions/branch-names@v8

  create-neon-branch:
    name: 🐘 Create Neon Branch
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs: setup
    outputs:
      db_url: ${{ steps.neon.outputs.db_url_with_pooler }}
      branch_id: ${{ steps.neon.outputs.branch_id }}
    steps:
      - name: Get expiration date
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon branch
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

  run-migrations:
    name: 🗄️ Run Migrations
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs: [setup, create-neon-branch]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install EF Core CLI
        run: dotnet tool install --global dotnet-ef

      - name: Restore dependencies
        working-directory: ./output
        run: dotnet restore

      - name: Run EF Core Migrations
        working-directory: ./output
        run: dotnet ef database update --project src/IonCrm.Infrastructure --startup-project src/IonCrm.API
        env:
          ConnectionStrings__DefaultConnection: ${{ needs.create-neon-branch.outputs.db_url }}
          Jwt__Key: ${{ secrets.JWT_SECRET_PROD }}
          ASPNETCORE_ENVIRONMENT: Development

  deploy-preview:
    name: 🚀 Deploy Preview
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs: [setup, create-neon-branch, run-migrations]
    steps:
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          SERVICE_ID="987799b6-18b9-4223-81c6-505ffc6717ba"
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceDeploy(serviceId: \\\"${SERVICE_ID}\\\") }\"}"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 🚀 Preview Deployment Ready!
            | | Details |
            |---|---|
            | **API URL** | https://ion-crm-api-production.up.railway.app |
            | **Branch** | \`${{ needs.setup.outputs.branch }}\` |
            | **PR** | #${{ github.event.number }} |
            | **Neon Branch** | \`preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}\` |

            > ✅ Migrations applied. Preview ready!`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('Preview Deployment Ready'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  delete-neon-branch:
    name: 🗑️ Delete Neon Branch
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ github.head_ref }}
          api_key: ${{ secrets.NEON_API_KEY }}
