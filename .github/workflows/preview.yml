name: ION CRM — Preview Environments

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

jobs:
  setup:
    name: 🔍 Get Branch Name
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch-names.outputs.current_branch }}
    steps:
      - name: Get branch name
        id: branch-names
        uses: tj-actions/branch-names@v8

  create-neon-branch:
    name: 🐘 Create Neon Branch
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs: setup
    outputs:
      db_url: ${{ steps.neon.outputs.db_url_with_pooler }}
    steps:
      - name: Get expiration date
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon branch
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

  comment-pr:
    name: 💬 Comment Preview URL
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs: [setup, create-neon-branch]
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = '${{ needs.setup.outputs.branch }}';
            const body = `## 🚀 Preview Environment Ready!

            | | Details |
            |---|---|
            | **API** | https://ion-crm-api-production.up.railway.app |
            | **Frontend** | https://ion-crm-frontend-production.up.railway.app |
            | **Branch** | \`${branchName}\` |
            | **Neon Branch** | \`preview/pr-${{ github.event.number }}-${branchName}\` |
            | **DB Expires** | 14 days |

            > ✅ Neon preview branch created. Test against the preview DB!`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('Preview Environment Ready'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  delete-neon-branch:
    name: 🗑️ Delete Neon Branch
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ github.head_ref }}
          api_key: ${{ secrets.NEON_API_KEY }}
