name: ION CRM — CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'
  BACKEND_SERVICE_ID: "987799b6-18b9-4223-81c6-505ffc6717ba"
  FRONTEND_SERVICE_ID: "8e6ec2df-e4a1-4fe1-afd9-31c22c5b2e59"
  DEV_ENVIRONMENT_ID: "c319cc09-f1a9-4d11-8119-a23815b9883a"
  PROD_ENVIRONMENT_ID: "3a43d00a-371c-4dc5-8a9d-e093afb5f857"

jobs:
  # ── Backend Tests ──────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Build & Test
        working-directory: ./output
        run: |
          dotnet restore
          dotnet build --configuration Release
          dotnet test --configuration Release

  # ── Frontend Build ─────────────────────────────────────────
  test-frontend:
    name: 🎨 Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: output/frontend/package-lock.json
      - name: Build
        working-directory: ./output/frontend
        run: npm ci && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

  # ── Security Scan ──────────────────────────────────────────
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Check vulnerable packages
        working-directory: ./output
        run: dotnet list package --vulnerable --include-transitive || true
      - name: Check for hardcoded secrets
        run: |
          if grep -rn \
            -e "password\s*=\s*['\"][^'\"]\+['\"]" \
            -e "secret\s*=\s*['\"][^'\"]\+['\"]" \
            -e "api[_-]key\s*=\s*['\"][^'\"]\+['\"]" \
            -e "AKIA[0-9A-Z]\{16\}" \
            --include="*.cs" --include="*.json" --include="*.ts" --include="*.js" \
            --exclude-dir=".git" --exclude-dir="node_modules" --exclude-dir="bin" \
            --exclude-dir="obj" --exclude-dir="tests" \
            . 2>/dev/null; then
            echo "❌ Potential hardcoded secrets found!"
            exit 1
          else
            echo "✅ No hardcoded secrets detected."
          fi

  # ── Deploy Development (Otomatik) ──────────────────────────
  deploy-development:
    name: 🔧 Deploy to Development
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: development
      url: https://ion-crm-api-development.up.railway.app
    steps:
      - name: Deploy Backend to Development
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🔧 Deploying to development..."
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceDeploy(serviceId: \\\"${{ env.BACKEND_SERVICE_ID }}\\\", environmentId: \\\"${{ env.DEV_ENVIRONMENT_ID }}\\\") }\"}"

      - name: Deploy Frontend to Development
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceDeploy(serviceId: \\\"${{ env.FRONTEND_SERVICE_ID }}\\\", environmentId: \\\"${{ env.DEV_ENVIRONMENT_ID }}\\\") }\"}"

      - name: Wait and health check
        run: |
          sleep 45
          curl -sf https://ion-crm-api-development.up.railway.app/health \
            && echo "✅ Development healthy!" || echo "⚠️ Health check failed"

  # ── Deploy Production (Manuel Onay) ────────────────────────
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-development]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://ion-crm-api-production.up.railway.app
    steps:
      - name: Deploy Backend to Production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🚀 Deploying to production..."
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceDeploy(serviceId: \\\"${{ env.BACKEND_SERVICE_ID }}\\\", environmentId: \\\"${{ env.PROD_ENVIRONMENT_ID }}\\\") }\"}"

      - name: Deploy Frontend to Production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceDeploy(serviceId: \\\"${{ env.FRONTEND_SERVICE_ID }}\\\", environmentId: \\\"${{ env.PROD_ENVIRONMENT_ID }}\\\") }\"}"

      - name: Wait and health check
        run: |
          sleep 45
          curl -sf https://ion-crm-api-production.up.railway.app/health \
            && echo "✅ Production healthy!" || exit 1
