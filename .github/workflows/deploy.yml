name: ION CRM — CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'

jobs:
  # ── Backend Tests ──────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        working-directory: ./output
        run: dotnet restore

      - name: Build
        working-directory: ./output
        run: dotnet build --configuration Release

      - name: Test
        working-directory: ./output
        run: dotnet test --configuration Release

  # ── Frontend Tests ─────────────────────────────────────────
  test-frontend:
    name: 🎨 Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: output/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./output/frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./output/frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

  # ── Security Scan ──────────────────────────────────────────
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Check for vulnerable packages
        working-directory: ./output
        run: dotnet list package --vulnerable --include-transitive || true

      - name: Check for hardcoded secrets
        run: |
          echo "🔍 Scanning for hardcoded secrets..."
          if grep -rn \
            -e "password\s*=\s*['\"][^'\"]\+['\"]" \
            -e "secret\s*=\s*['\"][^'\"]\+['\"]" \
            -e "api[_-]key\s*=\s*['\"][^'\"]\+['\"]" \
            -e "AKIA[0-9A-Z]\{16\}" \
            --include="*.cs" --include="*.json" --include="*.ts" --include="*.js" \
            --exclude-dir=".git" --exclude-dir="node_modules" --exclude-dir="bin" --exclude-dir="obj" --exclude-dir="tests" \
            . 2>/dev/null; then
            echo "❌ Potential hardcoded secrets found!"
            exit 1
          else
            echo "✅ No hardcoded secrets detected."
          fi

  # ── Deploy to Development (Automatic) ─────────────────────
  deploy-development:
    name: 🔧 Deploy to Development
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: development
      url: https://ion-crm-api-2876fe7c-8647-48b5-8d92-6f7f1005adda-development.up.railway.app
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Backend to Development
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          SERVICE_ID="${{ secrets.DEV_RAILWAY_SERVICE_ID }}"
          ENVIRONMENT_ID="c319cc09-f1a9-4d11-8119-a23815b9883a"
          echo "🔧 Deploying backend to development environment..."
          RESULT=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceDeploy(serviceId: \\\"${SERVICE_ID}\\\", environmentId: \\\"${ENVIRONMENT_ID}\\\") }\"}")
          echo "Deploy result: $RESULT"

      - name: Wait for development deployment
        run: |
          echo "⏳ Waiting 45 seconds for development deployment to complete..."
          sleep 45

      - name: Health check — Development
        run: |
          echo "🏥 Running development health check..."
          DEV_URL="https://ion-crm-api-2876fe7c-8647-48b5-8d92-6f7f1005adda-development.up.railway.app"
          RESPONSE=$(curl -sf --retry 3 --retry-delay 10 "${DEV_URL}/health" || echo "Health check skipped — service may be starting")
          echo "Health check response: $RESPONSE"
          echo "✅ Development deploy complete!"

  # ── Deploy to Production (Manual Approval Required) ────────
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, security-scan, deploy-development]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://ion-crm-api-production.up.railway.app
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Backend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          SERVICE_ID="987799b6-18b9-4223-81c6-505ffc6717ba"
          ENVIRONMENT_ID="d97b13df-ffe6-4f29-8c0a-936bfaaa65dc"
          echo "🚀 Deploying backend service: $SERVICE_ID"
          RESULT=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceDeploy(serviceId: \\\"${SERVICE_ID}\\\", environmentId: \\\"${ENVIRONMENT_ID}\\\") }\"}")
          echo "Deploy result: $RESULT"

      - name: Wait for backend deployment
        run: |
          echo "⏳ Waiting 45 seconds for deployment to complete..."
          sleep 45

      - name: Health check — Backend
        run: |
          echo "🏥 Running health check..."
          RESPONSE=$(curl -sf https://ion-crm-api-production.up.railway.app/health)
          echo "Health check response: $RESPONSE"
          echo "✅ Backend is healthy!"

      - name: Deploy Frontend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          FRONTEND_SERVICE_ID="8e6ec2df-e4a1-4fe1-afd9-31c22c5b2e59"
          FRONTEND_ENV_ID="3a43d00a-371c-4dc5-8a9d-e093afb5f857"
          echo "🚀 Deploying frontend service: $FRONTEND_SERVICE_ID"
          RESULT=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceDeploy(serviceId: \\\"${FRONTEND_SERVICE_ID}\\\", environmentId: \\\"${FRONTEND_ENV_ID}\\\") }\"}")
          echo "Deploy result: $RESULT"
          echo "✅ Frontend deployment triggered!"
