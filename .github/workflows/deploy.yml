name: ION CRM — CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'

jobs:
  # ── Backend Tests ──────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        working-directory: ./output
        run: dotnet restore

      - name: Build
        working-directory: ./output
        run: dotnet build --no-restore --configuration Release

      - name: Run Tests
        working-directory: ./output
        run: |
          dotnet test --no-build \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: output/tests/**/*.trx

  # ── Frontend Tests & Build ─────────────────────────────────
  test-frontend:
    name: 🎨 Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: output/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./output/frontend
        run: npm ci

      - name: Type check
        working-directory: ./output/frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: ./output/frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

  # ── Security Scan ──────────────────────────────────────────
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: [test-backend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Check vulnerable packages
        working-directory: ./output
        run: dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt

      - name: Scan for secrets in code
        run: |
          echo "Scanning for hardcoded secrets..."
          ! grep -r "sk-ant-api" ./output/src --include="*.cs" -l
          ! grep -r "ghp_" ./output/src --include="*.cs" -l
          ! grep -rE "password\s*=\s*\"[^\"]{3,}\"" ./output/src --include="*.cs" -l
          echo "No hardcoded secrets found ✅"

  # ── Deploy to Railway ──────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Backend to Railway
        working-directory: ./output
        run: railway up --service ion-crm-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy Frontend to Railway
        working-directory: ./output/frontend
        run: railway up --service ion-crm-frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Notify deployment
        if: success()
        run: |
          echo "✅ ION CRM deployed successfully!"
          echo "Backend: https://ion-crm-api.railway.app"
          echo "Frontend: https://ion-crm.railway.app"
